<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survey Data</title>
<style>
  :root{
    --sky-1:#eef8fe;
    --sky-2:#cfeaf9;
    --baby-blue:#a9dbf3;
    --blue-mid:#5fb3e0;
    --blue-deep:#1f6fa3;
    --navy:#134166;
    --ink:#173147;
    --paper:#ffffff;
    --paper-soft:#f3fbff;
    --line:#d8edf8;
    --muted:#6a8ba3;
    --accent:#ffc95c;
    --accent-2:#ff9fb0;
    --danger:#e15b6b;
    --radius:14px;
    --shadow:0 10px 30px rgba(25,90,130,0.20);
    font-family: 'Segoe UI', Roboto, -apple-system, BlinkMacSystemFont, sans-serif;
  }

  *{box-sizing:border-box;}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001s !important; animation-iteration-count:1 !important; transition-duration:0.001s !important;}
  }

  html{scroll-behavior:smooth;}

  body{
    margin:0;
    min-height:100vh;
    position:relative;
    overflow-x:hidden;
    background:
      radial-gradient(circle at 15% 12%, rgba(255,255,255,0.55) 0, rgba(255,255,255,0) 40%),
      radial-gradient(circle at 85% 8%, rgba(255,255,255,0.35) 0, rgba(255,255,255,0) 35%),
      linear-gradient(160deg, var(--sky-1) 0%, var(--sky-2) 30%, var(--baby-blue) 62%, var(--blue-mid) 100%);
    background-attachment: fixed;
    color:var(--ink);
    padding: 28px 16px 60px;
  }

  /* drifting cloud / bubble ambience */
  .sky-deco{
    position:fixed;
    inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index:0;
  }
  .cloud{
    position:absolute;
    background: radial-gradient(ellipse at center, rgba(255,255,255,0.85) 0%, rgba(255,255,255,0.0) 70%);
    border-radius:50%;
    filter: blur(1px);
    opacity:0.7;
    animation: driftCloud linear infinite;
  }
  .cloud.c1{width:220px; height:90px; top:6%; left:-15%; animation-duration:52s;}
  .cloud.c2{width:160px; height:70px; top:22%; left:-25%; animation-duration:70s; animation-delay:-15s;}
  .cloud.c3{width:280px; height:110px; top:55%; left:-30%; animation-duration:85s; animation-delay:-30s;}
  .cloud.c4{width:130px; height:60px; top:75%; left:-10%; animation-duration:46s; animation-delay:-8s;}
  @keyframes driftCloud{
    0%{ transform: translateX(0); }
    100%{ transform: translateX(140vw); }
  }
  .bubble{
    position:absolute;
    bottom:-60px;
    border-radius:50%;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), rgba(255,255,255,0.05) 70%);
    border:1px solid rgba(255,255,255,0.5);
    animation: floatBubble linear infinite;
    opacity:0.55;
  }
  @keyframes floatBubble{
    0%{ transform: translateY(0) translateX(0) scale(1); opacity:0; }
    10%{ opacity:0.55; }
    100%{ transform: translateY(-115vh) translateX(20px) scale(1.15); opacity:0; }
  }

  .wrap{
    max-width: 980px;
    margin: 0 auto;
    position:relative;
    z-index:1;
  }

  .brand{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:12px;
    margin-bottom:22px;
    color:var(--navy);
    animation: dropIn .5s ease;
  }
  @keyframes dropIn{
    from{opacity:0; transform:translateY(-14px);}
    to{opacity:1; transform:translateY(0);}
  }

  .brand-left{display:flex; align-items:center; gap:12px;}

  .brand-mark{
    width:46px;height:46px;border-radius:14px;
    background: linear-gradient(135deg, #ffffff, var(--sky-2));
    border:1px solid rgba(255,255,255,0.7);
    display:flex;align-items:center;justify-content:center;
    font-weight:700; font-size:20px;
    box-shadow: 0 6px 16px rgba(31,111,163,0.25);
    animation: gentleBob 4.5s ease-in-out infinite;
  }
  @keyframes gentleBob{
    0%,100%{ transform: translateY(0) rotate(0deg); }
    50%{ transform: translateY(-4px) rotate(-4deg); }
  }

  .brand-title{font-size:21px; font-weight:800; letter-spacing:0.2px; color:var(--navy);}
  .brand-sub{font-size:12.5px; opacity:0.75; margin-top:2px; color:var(--navy);}

  .nav{
    display:flex;
    gap:8px;
    background: rgba(255,255,255,0.55);
    padding:6px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,0.8);
    backdrop-filter: blur(6px);
    box-shadow: 0 4px 14px rgba(31,111,163,0.12);
  }
  .nav button{
    border:none;
    background:transparent;
    color:var(--navy);
    padding:9px 18px;
    border-radius:999px;
    font-size:13.5px;
    font-weight:700;
    cursor:pointer;
    transition: background .2s ease, color .2s ease, transform .15s ease;
  }
  .nav button.active{
    background: linear-gradient(120deg, var(--blue-mid), var(--blue-deep));
    color:#fff;
    box-shadow:0 4px 12px rgba(31,111,163,0.35);
  }
  .nav button:not(.active):hover{
    background: rgba(255,255,255,0.7);
    transform:translateY(-1px);
  }

  .card{
    background:var(--paper);
    border-radius:22px;
    box-shadow:var(--shadow);
    padding:30px 30px 26px;
    animation: rise .4s cubic-bezier(.22,1,.36,1);
    position:relative;
    overflow:hidden;
  }
  .card::before{
    content:"";
    position:absolute;
    top:-40%; right:-15%;
    width:260px; height:260px;
    background: radial-gradient(circle, rgba(169,219,243,0.5), rgba(169,219,243,0) 70%);
    border-radius:50%;
    pointer-events:none;
  }
  @keyframes rise{
    from{opacity:0; transform:translateY(16px) scale(.99);}
    to{opacity:1; transform:translateY(0) scale(1);}
  }

  .card h1{
    margin:0 0 4px;
    font-size:23px;
    color:var(--blue-deep);
    display:flex;
    align-items:center;
    gap:8px;
  }
  .card p.lead{
    margin:0 0 22px;
    color:var(--muted);
    font-size:13.5px;
  }

  .grid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:16px 18px;
  }
  .field{display:flex; flex-direction:column; gap:6px; animation: fieldIn .35s ease both;}
  .field.full{grid-column: 1 / -1;}
  @keyframes fieldIn{
    from{opacity:0; transform:translateY(6px);}
    to{opacity:1; transform:translateY(0);}
  }

  label{
    font-size:12.5px;
    font-weight:700;
    color:var(--blue-deep);
    letter-spacing:0.2px;
  }

  input[type=text], input[type=tel], input[type=number], textarea, select{
    border:1.5px solid var(--line);
    background:var(--paper-soft);
    border-radius:999px;
    padding:11px 16px;
    font-size:14px;
    color:var(--ink);
    outline:none;
    transition:border-color .18s ease, box-shadow .18s ease, background .18s ease;
    width:100%;
    font-family:inherit;
  }
  textarea{
    border-radius:16px;
    resize:vertical;
    min-height:64px;
  }
  input:focus, textarea:focus{
    border-color: var(--blue-mid);
    box-shadow: 0 0 0 4px rgba(95,179,224,0.22);
    background:#fff;
  }
  input:hover, textarea:hover{ border-color: var(--baby-blue); }

  .photo-box{
    border:1.5px dashed var(--baby-blue);
    border-radius:16px;
    background:var(--paper-soft);
    padding:16px;
    display:flex;
    align-items:center;
    gap:14px;
    transition: border-color .2s ease, background .2s ease;
  }
  .photo-box:hover{ border-color:var(--blue-mid); background:#eaf7ff; }
  .photo-preview{
    width:64px;height:64px;border-radius:12px;
    object-fit:cover;
    background:#e6f4fb;
    border:1px solid var(--line);
    display:none;
    transition: transform .2s ease;
  }
  .photo-preview.show{display:block; animation: popIn .3s ease;}
  @keyframes popIn{
    from{ transform:scale(.7); opacity:0; }
    to{ transform:scale(1); opacity:1; }
  }
  .photo-box input[type=file]{font-size:12.5px;}

  .btn-row{
    display:flex;
    gap:12px;
    margin-top:26px;
    flex-wrap:wrap;
  }
  button.primary, button.secondary, button.ghost, button.danger{
    border:none;
    cursor:pointer;
    font-weight:700;
    font-size:14px;
    padding:12px 26px;
    border-radius:999px;
    transition: transform .14s ease, box-shadow .14s ease, opacity .14s ease, filter .14s ease;
    position:relative;
    overflow:hidden;
  }
  button.primary{
    background: linear-gradient(120deg, var(--blue-mid), var(--blue-deep), var(--blue-mid));
    background-size:200% 100%;
    color:#fff;
    box-shadow:0 8px 20px rgba(31,111,163,0.35);
    animation: shimmerBtn 6s ease infinite;
  }
  @keyframes shimmerBtn{
    0%{ background-position:0% 50%; }
    50%{ background-position:100% 50%; }
    100%{ background-position:0% 50%; }
  }
  button.secondary{
    background:#fff;
    color:var(--blue-deep);
    border:1.5px solid var(--blue-mid);
  }
  button.ghost{
    background:transparent;
    color:var(--muted);
    border:1.5px solid var(--line);
  }
  button.danger{
    background:#fff;
    color:var(--danger);
    border:1.5px solid var(--danger);
  }
  button:hover{transform:translateY(-2px); filter:brightness(1.03);}
  button.primary:hover{ box-shadow:0 12px 26px rgba(31,111,163,0.45); }
  button:active{transform:translateY(0) scale(.98);}
  button:disabled{opacity:0.5; cursor:not-allowed; transform:none;}

  /* Page 2 - Enquiries */
  .search-bar{
    display:flex;
    align-items:center;
    gap:10px;
    background:var(--paper-soft);
    border:1.5px solid var(--line);
    border-radius:999px;
    padding:8px 16px;
    margin-bottom:20px;
    transition: box-shadow .2s ease, border-color .2s ease;
  }
  .search-bar:focus-within{
    border-color:var(--blue-mid);
    box-shadow: 0 0 0 4px rgba(95,179,224,0.18);
  }
  .search-bar input{
    border:none;
    background:transparent;
    padding:6px 4px;
  }
  .search-bar input:focus{box-shadow:none;}
  .search-icon{color:var(--muted); font-size:15px;}

  table{
    width:100%;
    border-collapse:collapse;
    overflow:hidden;
    border-radius:14px;
  }
  thead th{
    background: linear-gradient(120deg, var(--paper-soft), #e7f5fd);
    color:var(--blue-deep);
    text-align:left;
    font-size:12.5px;
    letter-spacing:0.4px;
    text-transform:uppercase;
    padding:12px 16px;
    border-bottom:2px solid var(--line);
  }
  tbody td{
    padding:13px 16px;
    border-bottom:1px solid var(--line);
    font-size:14px;
  }
  tbody tr{
    animation: rowIn .35s ease both;
    transition: background .15s ease;
  }
  tbody tr:hover{background:#f2fbff;}
  tbody tr:last-child td{border-bottom:none;}
  @keyframes rowIn{
    from{ opacity:0; transform:translateX(-6px); }
    to{ opacity:1; transform:translateX(0); }
  }
  .sno-col{width:70px; color:var(--muted); font-weight:600;}
  a.name-link{
    color:var(--blue-deep);
    font-weight:700;
    text-decoration:none;
    cursor:pointer;
    transition: color .15s ease;
  }
  a.name-link:hover{text-decoration:underline; color:var(--accent-2);}

  .empty-state{
    text-align:center;
    padding:50px 10px;
    color:var(--muted);
    animation: fieldIn .4s ease;
  }
  .empty-state .big{font-size:38px; margin-bottom:10px; display:inline-block; animation: gentleBob 3.4s ease-in-out infinite;}

  /* Page 3 - Details */
  .detail-header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:16px;
    flex-wrap:wrap;
    margin-bottom:20px;
  }
  .detail-photo{
    width:112px;height:112px;
    border-radius:18px;
    object-fit:cover;
    border:2px solid var(--baby-blue);
    background:var(--paper-soft);
    box-shadow:0 8px 18px rgba(31,111,163,0.2);
  }
  .detail-photo-wrap{display:flex; gap:16px; align-items:center;}
  .detail-name{font-size:21px; font-weight:800; color:var(--blue-deep); margin:0 0 3px;}
  .detail-sub{font-size:13px; color:var(--muted);}

  .detail-grid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:0;
    border:1px solid var(--line);
    border-radius:14px;
    overflow:hidden;
  }
  .detail-item{
    padding:13px 18px;
    border-bottom:1px solid var(--line);
    border-right:1px solid var(--line);
    transition: background .15s ease;
    animation: fieldIn .3s ease both;
  }
  .detail-item:hover{ background:#f7fcff; }
  .detail-item:nth-child(2n){border-right:none;}
  .detail-item.full{grid-column: 1 / -1; border-right:none;}
  .detail-label{
    font-size:11.5px;
    text-transform:uppercase;
    letter-spacing:0.4px;
    color:var(--muted);
    font-weight:700;
    margin-bottom:4px;
  }
  .detail-value{font-size:14.5px; color:var(--ink); word-break:break-word;}
  .detail-value.empty{color:#b9d3e2; font-style:italic;}

  .toast{
    position:fixed;
    bottom:24px; left:50%;
    transform:translateX(-50%) translateY(20px);
    background: linear-gradient(120deg, var(--navy), var(--blue-deep));
    color:#fff;
    padding:12px 22px;
    border-radius:999px;
    font-size:13.5px;
    font-weight:600;
    box-shadow:0 10px 26px rgba(19,65,102,0.35);
    opacity:0;
    pointer-events:none;
    transition: opacity .3s ease, transform .3s cubic-bezier(.22,1,.36,1);
    z-index:50;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  .confirm-overlay{
    position:fixed; inset:0;
    background:rgba(19,65,102,0.45);
    backdrop-filter: blur(2px);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:60;
    padding:20px;
  }
  .confirm-overlay.show{display:flex; animation: fadeBg .2s ease;}
  @keyframes fadeBg{ from{opacity:0;} to{opacity:1;} }
  .confirm-box{
    background:#fff;
    border-radius:18px;
    padding:24px;
    max-width:340px;
    width:100%;
    box-shadow:var(--shadow);
    text-align:center;
    animation: popIn .25s cubic-bezier(.22,1,.36,1);
  }
  .confirm-box p{margin:0 0 18px; color:var(--ink); font-size:14.5px;}
  .confirm-row{display:flex; gap:10px; justify-content:center;}

  @media (max-width: 640px){
    .grid{grid-template-columns: 1fr;}
    .card{padding:22px 18px 20px;}
    .detail-grid{grid-template-columns: 1fr;}
    .detail-item{border-right:none;}
    .nav button{padding:8px 12px; font-size:12.5px;}
    .brand-title{font-size:17px;}
  }
</style>
</head>
<body>

<div class="sky-deco" aria-hidden="true">
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="cloud c3"></div>
  <div class="cloud c4"></div>
</div>

<div class="wrap">
  <div class="brand">
    <div class="brand-left">
      <div class="brand-mark">☁️</div>
      <div>
        <div class="brand-title">Survey Data Entry</div>
        <div class="brand-sub">Beneficiary records &amp; enquiries</div>
      </div>
    </div>
    <div class="nav">
      <button id="navEntry" class="active">Data Entry</button>
      <button id="navEnquiries">Enquiries</button>
    </div>
  </div>

  <div id="app"></div>
</div>

<div class="toast" id="toast"></div>

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <p id="confirmText">Delete this record?</p>
    <div class="confirm-row">
      <button class="ghost" id="confirmCancel">Cancel</button>
      <button class="danger" id="confirmOk">Delete</button>
    </div>
  </div>
</div>

<script>
(function(){

  const FIELDS = [
    {key:'name', label:'Name', type:'text', full:false},
    {key:'soWo', label:'S/O (or) W/O', type:'text', full:false},
    {key:'phone', label:'Phone Number', type:'tel', full:false},
    {key:'aadhar', label:'Aadhar Number', type:'text', full:false},
    {key:'ration', label:'Ration Number', type:'text', full:false},
    {key:'age', label:'Age', type:'number', full:false},
    {key:'caste', label:'Caste', type:'text', full:false},
    {key:'occupation', label:'Occupation', type:'text', full:false},
    {key:'address', label:'Present Address', type:'textarea', full:true},
    {key:'bank', label:'Bank', type:'text', full:false},
    {key:'accountNo', label:'Account Number', type:'text', full:false},
    {key:'dds', label:"DD'S", type:'text', full:false},
    {key:'slots', label:'Slots', type:'text', full:false},
    {key:'enquiry', label:'Enquiry', type:'text', full:false},
    {key:'remarks', label:'Remarks', type:'textarea', full:true},
    {key:'assets', label:'Assets', type:'text', full:false},
    {key:'govIssues', label:'Government Issues', type:'textarea', full:true},
    {key:'tidco', label:'TIDCO Sanction', type:'text', full:false},
  ];

  const app = document.getElementById('app');
  const toastEl = document.getElementById('toast');
  const navEntry = document.getElementById('navEntry');
  const navEnquiries = document.getElementById('navEnquiries');
  const confirmOverlay = document.getElementById('confirmOverlay');
  const confirmText = document.getElementById('confirmText');
  const confirmCancel = document.getElementById('confirmCancel');
  const confirmOk = document.getElementById('confirmOk');
  const skyDeco = document.querySelector('.sky-deco');

  let records = [];
  let view = 'entry';       // 'entry' | 'enquiries' | 'details'
  let editingId = null;     // id being edited on entry form
  let selectedId = null;    // id shown on details page
  let searchTerm = '';
  let pendingDeleteId = null;

  function spawnBubbles(){
    const count = 9;
    for(let i=0;i<count;i++){
      const b = document.createElement('div');
      b.className = 'bubble';
      const size = 10 + Math.random()*26;
      b.style.width = size + 'px';
      b.style.height = size + 'px';
      b.style.left = (Math.random()*100) + 'vw';
      b.style.animationDuration = (14 + Math.random()*16) + 's';
      b.style.animationDelay = (Math.random()*18) + 's';
      skyDeco.appendChild(b);
    }
  }
  spawnBubbles();

  function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(()=> toastEl.classList.remove('show'), 2200);
  }

  async function loadRecords(){
    try{
      const res = await window.storage.get('survey-records', false);
      records = res && res.value ? JSON.parse(res.value) : [];
    }catch(e){
      records = [];
    }
  }

  async function persist(){
    try{
      await window.storage.set('survey-records', JSON.stringify(records), false);
    }catch(e){
      showToast("Couldn't save — please try again");
    }
  }

  function setView(v){
    view = v;
    navEntry.classList.toggle('active', v === 'entry');
    navEnquiries.classList.toggle('active', v === 'enquiries' || v === 'details');
    render();
  }

  navEntry.addEventListener('click', ()=>{ editingId = null; setView('entry'); });
  navEnquiries.addEventListener('click', ()=> setView('enquiries'));

  confirmCancel.addEventListener('click', ()=>{
    confirmOverlay.classList.remove('show');
    pendingDeleteId = null;
  });
  confirmOk.addEventListener('click', async ()=>{
    if(pendingDeleteId){
      records = records.filter(r => r.id !== pendingDeleteId);
      await persist();
      showToast('Record deleted');
      pendingDeleteId = null;
      confirmOverlay.classList.remove('show');
      setView('enquiries');
    }
  });

  function fieldRow(f, value, delayIndex){
    const id = 'f_' + f.key;
    const style = `style="animation-delay:${(delayIndex||0) * 0.02}s"`;
    if(f.type === 'textarea'){
      return `<div class="field ${f.full ? 'full' : ''}" ${style}>
        <label for="${id}">${f.label}</label>
        <textarea id="${id}" data-key="${f.key}">${escapeHtml(value||'')}</textarea>
      </div>`;
    }
    return `<div class="field ${f.full ? 'full' : ''}" ${style}>
      <label for="${id}">${f.label}</label>
      <input type="${f.type}" id="${id}" data-key="${f.key}" value="${escapeHtml(value||'')}">
    </div>`;
  }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, s => ({
      '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
    }[s]));
  }

  function renderEntry(){
    const editingRecord = editingId ? records.find(r => r.id === editingId) : null;
    const heading = editingRecord ? 'Edit Record' : 'New Survey Record';
    const sub = editingRecord ? `Updating details for ${escapeHtml(editingRecord.name || 'this beneficiary')}.` : 'Fill in the beneficiary details below.';

    app.innerHTML = `
      <div class="card">
        <h1>${editingRecord ? '✏️' : '📝'} ${heading}</h1>
        <p class="lead">${sub}</p>
        <div class="grid" id="formGrid">
          ${FIELDS.map((f, i) => fieldRow(f, editingRecord ? editingRecord[f.key] : '', i)).join('')}
          <div class="field full">
            <label>Photo Upload</label>
            <div class="photo-box">
              <img id="photoPreview" class="photo-preview ${editingRecord && editingRecord.photo ? 'show' : ''}" src="${editingRecord && editingRecord.photo ? editingRecord.photo : ''}">
              <input type="file" id="photoInput" accept="image/*">
            </div>
          </div>
        </div>
        <div class="btn-row">
          <button class="primary" id="saveBtn">${editingRecord ? 'Update Record' : 'Data Enter'}</button>
          <button class="secondary" id="goEnquiriesBtn">Enquiries</button>
          ${editingRecord ? '<button class="ghost" id="cancelEditBtn">Cancel Edit</button>' : ''}
        </div>
      </div>
    `;

    let photoData = editingRecord && editingRecord.photo ? editingRecord.photo : '';
    const photoInput = document.getElementById('photoInput');
    const photoPreview = document.getElementById('photoPreview');
    photoInput.addEventListener('change', () => {
      const file = photoInput.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        photoData = reader.result;
        photoPreview.src = photoData;
        photoPreview.classList.remove('show');
        void photoPreview.offsetWidth;
        photoPreview.classList.add('show');
      };
      reader.readAsDataURL(file);
    });

    document.getElementById('goEnquiriesBtn').addEventListener('click', () => setView('enquiries'));

    const cancelBtn = document.getElementById('cancelEditBtn');
    if(cancelBtn){
      cancelBtn.addEventListener('click', () => { editingId = null; setView('entry'); });
    }

    document.getElementById('saveBtn').addEventListener('click', async () => {
      const data = {};
      FIELDS.forEach(f => {
        const el = document.getElementById('f_' + f.key);
        data[f.key] = el.value.trim();
      });
      if(!data.name){
        showToast('Please enter a name before saving');
        document.getElementById('f_name').focus();
        return;
      }
      data.photo = photoData;

      if(editingId){
        const idx = records.findIndex(r => r.id === editingId);
        if(idx > -1){
          records[idx] = { ...records[idx], ...data };
        }
        await persist();
        showToast('Record updated');
        const savedId = editingId;
        editingId = null;
        selectedId = savedId;
        setView('details');
      } else {
        const newRecord = { id: 'rec_' + Date.now() + '_' + Math.random().toString(36).slice(2,7), ...data, createdAt: new Date().toISOString() };
        records.push(newRecord);
        await persist();
        showToast('Record saved');
        setView('entry');
      }
    });
  }

  function renderEnquiries(){
    const filtered = records
      .filter(r => (r.name || '').toLowerCase().includes(searchTerm.toLowerCase()))
      .slice()
      .reverse();

    app.innerHTML = `
      <div class="card">
        <h1>🔎 Enquiries</h1>
        <p class="lead">All saved survey records. Click a name to view full details.</p>
        <div class="search-bar">
          <span class="search-icon">&#128269;</span>
          <input type="text" id="searchInput" placeholder="Search by name..." value="${escapeHtml(searchTerm)}">
        </div>
        <div id="tableHolder"></div>
      </div>
    `;

    const holder = document.getElementById('tableHolder');
    if(filtered.length === 0){
      holder.innerHTML = `
        <div class="empty-state">
          <div class="big">&#9925;</div>
          <div>${records.length === 0 ? 'No records yet. Add one from Data Entry.' : 'No records match your search.'}</div>
        </div>`;
    } else {
      holder.innerHTML = `
        <table>
          <thead><tr><th class="sno-col">S.No.</th><th>Name</th></tr></thead>
          <tbody>
            ${filtered.map((r, i) => `
              <tr style="animation-delay:${i * 0.035}s">
                <td class="sno-col">${i + 1}</td>
                <td><a class="name-link" data-id="${r.id}">${escapeHtml(r.name || '(no name)')}</a></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
      holder.querySelectorAll('.name-link').forEach(a => {
        a.addEventListener('click', () => {
          selectedId = a.getAttribute('data-id');
          setView('details');
        });
      });
    }

    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('input', () => {
      searchTerm = searchInput.value;
      renderEnquiries();
      searchInput.focus();
      searchInput.setSelectionRange(searchInput.value.length, searchInput.value.length);
    });
  }

  function renderDetails(){
    const record = records.find(r => r.id === selectedId);
    if(!record){
      setView('enquiries');
      return;
    }

    app.innerHTML = `
      <div class="card">
        <div class="detail-header">
          <div class="detail-photo-wrap">
            ${record.photo
              ? `<img class="detail-photo" src="${record.photo}">`
              : `<div class="detail-photo" style="display:flex;align-items:center;justify-content:center;color:#9cc3d9;font-size:11px;">No Photo</div>`}
            <div>
              <p class="detail-name">${escapeHtml(record.name || '(no name)')}</p>
              <p class="detail-sub">Record ID: ${record.id}</p>
            </div>
          </div>
          <div class="btn-row" style="margin-top:0;">
            <button class="secondary" id="editBtn">Edit</button>
            <button class="danger" id="deleteBtn">Delete</button>
            <button class="ghost" id="backBtn">Back</button>
          </div>
        </div>

        <div class="detail-grid">
          ${FIELDS.map((f, i) => `
            <div class="detail-item ${f.full ? 'full' : ''}" style="animation-delay:${i * 0.025}s">
              <div class="detail-label">${f.label}</div>
              <div class="detail-value ${record[f.key] ? '' : 'empty'}">${record[f.key] ? escapeHtml(record[f.key]) : 'Not provided'}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;

    document.getElementById('backBtn').addEventListener('click', () => setView('enquiries'));
    document.getElementById('editBtn').addEventListener('click', () => {
      editingId = record.id;
      setView('entry');
    });
    document.getElementById('deleteBtn').addEventListener('click', () => {
      pendingDeleteId = record.id;
      confirmText.textContent = `Delete the record for "${record.name || 'this beneficiary'}"? This can't be undone.`;
      confirmOverlay.classList.add('show');
    });
  }

  function render(){
    if(view === 'entry') renderEntry();
    else if(view === 'enquiries') renderEnquiries();
    else if(view === 'details') renderDetails();
  }

  (async function init(){
    await loadRecords();
    render();
  })();

})();
</script>
</body>
</html>
